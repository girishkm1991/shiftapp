# Enterprise Docker Compose Cluster for Imvelo Shift Scalability
version: '3.8'

services:
  # 1. Full-Stack Node Express & React Core App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imvelo-shift-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mysql://imvelo_user:imvelo_secure_password@mysql:3306/imvelo_shift_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=imvelo_jwt_secret_pilot_scale
      - ENABLE_REDIS=false
      - ENABLE_WHATSAPP=false
      - ENABLE_BACKGROUND_JOBS=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - imvelo_network

  # 2. Relational Database (MySQL)
  mysql:
    image: mysql:8.0
    container_name: imvelo-shift-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=imvelo_shift_db
      - MYSQL_USER=imvelo_user
      - MYSQL_PASSWORD=imvelo_secure_password
      - MYSQL_ROOT_PASSWORD=imvelo_root_super_secure_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql # Auto-initializes on startup
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pimvelo_root_super_secure_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - imvelo_network

  # 3. Cache & Queue Engine (Redis for BullMQ background workers)
  redis:
    image: redis:7-alpine
    container_name: imvelo-shift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - imvelo_network

volumes:
  app_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  imvelo_network:
    driver: bridge
